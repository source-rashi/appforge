version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: appforge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: appforge
      POSTGRES_PASSWORD: appforge
      POSTGRES_DB: appforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appforge -d appforge"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
